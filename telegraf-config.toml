# Read metrics from MQTT topic(s)
[[inputs.mqtt_consumer]]
    ## Broker URLs for the MQTT server
    servers = ["tcp://broker:1883"]
    ## Topics that will be subscribed to.
    topics = [
        "octoPrint/#",
        "octoPrint1/#"
    ]
    ## The message topic will be stored in a tag specified by this value.
    topic_tag = "" #entire topic does not need to be a tag, since we're filtering.
    # see below for mqtt topic parsing.
    ## Interval and ping timeout for keep-alive messages
    ## The sum of those options defines when a connection loss is detected.
    ## Note: The keep-alive interval needs to be greater or equal one second and
    ## fractions of a second are not supported.
    keepalive = "60s"
    ping_timeout = "10s"
    ## Username and password to connect MQTT server.
    ## Not needed in case of allowed anonymous connection
    # username = "telegraf"
    # password = "metricsmetricsmetricsmetrics"
    ## Data format to consume.
    data_format = "json"
    json_time_key = "_timestamp"
    json_time_format = "unix"
    json_timezone = "Europe/Brussels"
    [[processors.rename]]
    [[processors.rename.replace]]
        field = "time"
        dest = "event_time"
    [[inputs.mqtt_consumer.topic_parsing]]
        topic = "+/progress/+"
        measurement = "_/measurement/_"
        tags = "octoprint_instance/_/type"
    [[inputs.mqtt_consumer.topic_parsing]]
        topic = "+/temperature/+"
        measurement = "_/measurement/_"
        tags = "octoprint_instance/_/tool"
    [[inputs.mqtt_consumer.topic_parsing]]
        topic = "+/event/+"
        measurement = "_/measurement/_"
        tags = "octoprint_instance/_/event"

# Moonraker split-status stream for toolhead position (x/y/z/e)
# Requires in moonraker.conf:
#   publish_split_status: True
[[inputs.mqtt_consumer]]
    servers = ["tcp://broker:1883"]
    topics = [
        "moonraker-virtual-printer/klipper/state/motion_report/live_position"
    ]
    data_format = "json_v2"
    name_override = "printer_position"
    [[inputs.mqtt_consumer.topic_parsing]]
        topic = "moonraker-virtual-printer/klipper/state/+/+"
        tags = "_/_/_/object/field"
    [[inputs.mqtt_consumer.json_v2]]
        timestamp_path = "eventtime"
        timestamp_format = "unix"
        [[inputs.mqtt_consumer.json_v2.field]]
            path = "value.0"
            rename = "x"
            type = "float"
        [[inputs.mqtt_consumer.json_v2.field]]
            path = "value.1"
            rename = "y"
            type = "float"
        [[inputs.mqtt_consumer.json_v2.field]]
            path = "value.2"
            rename = "z"
            type = "float"
        [[inputs.mqtt_consumer.json_v2.field]]
            path = "value.3"
            rename = "e"
            type = "float"

# Moonraker split-status stream for extruder/bed temperatures and targets
[[inputs.mqtt_consumer]]
    servers = ["tcp://broker:1883"]
    topics = [
        "moonraker-virtual-printer/klipper/state/extruder/temperature",
        "moonraker-virtual-printer/klipper/state/extruder/target",
        "moonraker-virtual-printer/klipper/state/heater_bed/temperature",
        "moonraker-virtual-printer/klipper/state/heater_bed/target"
    ]
    data_format = "json_v2"
    name_override = "printer_temperature"
    [[inputs.mqtt_consumer.topic_parsing]]
        topic = "moonraker-virtual-printer/klipper/state/+/+"
        tags = "_/_/_/heater/field"
    [[inputs.mqtt_consumer.json_v2]]
        timestamp_path = "eventtime"
        timestamp_format = "unix"
        [[inputs.mqtt_consumer.json_v2.field]]
            path = "value"
            rename = "value"
            type = "float"

[[outputs.file]]
    ## Files to write to
    files = ["stdout"]
    # data_format = "json"
[[outputs.postgresql]]
    ## OctoPrint metrics only
    namedrop = ["printer_position", "printer_temperature"]
    ## Specify connection address via the standard libpq connection string:
    ##   host=... user=... password=... sslmode=... dbname=...
    connection = "host=timescaledb user=postgres password=postgres sslmode=disable dbname=octoPrint"
    ## Postgres schema to use.
    schema = "public"
    ## Type of the timestamp column
    timestamp_column_type = "timestamp with time zone"
    create_templates = [
    '''CREATE TABLE {{ .table }} ({{ .columns }})''',
    '''SELECT create_hypertable({{ .table|quoteLiteral }}, by_range('time'));''',
    ]
    log_level = "debug"

[[outputs.postgresql]]
    ## Moonraker metrics only
    namepass = ["printer_position", "printer_temperature"]
    ## Specify connection address via the standard libpq connection string:
    ##   host=... user=... password=... sslmode=... dbname=...
    connection = "host=timescaledb user=postgres password=postgres sslmode=disable dbname=moonraker"
    ## Postgres schema to use.
    schema = "public"
    ## Type of the timestamp column
    timestamp_column_type = "timestamp with time zone"
    create_templates = [
    '''CREATE TABLE {{ .table }} ({{ .columns }})''',
    '''SELECT create_hypertable({{ .table|quoteLiteral }}, by_range('time'));''',
    ]
    log_level = "debug"

